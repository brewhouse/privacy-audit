# Render Blueprint — hosted privacy-audit API.
# Deploy: push to GitHub, then in Render → New → Blueprint, point at this repo.
# Secrets (sync: false) must be set in the Render dashboard after the first deploy.
services:
  - type: web
    name: privacy-audit
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard            # Chromium needs real memory; free/starter (512MB) will OOM.
    region: oregon
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # --- Staff login (required for the web form) ---
      - key: ADMIN_USERNAME           # Username staff sign in with at /.
        sync: false
      - key: ADMIN_PASSWORD           # Password staff sign in with. Use a strong value.
        sync: false
      - key: SESSION_SECRET           # Optional: HMAC key for session cookies. If unset,
        sync: false                   # it derives from ADMIN_PASSWORD (changing the password logs everyone out).

      # --- Optional: programmatic/API access (bearer token, for CLI/scripts) ---
      - key: AUDIT_API_TOKEN          # Optional. If set, clients may send Authorization: Bearer <token>.
        sync: false

      # --- Scope guard ---
      - key: ALLOWED_DOMAINS          # Comma-separated host suffixes you're authorized to scan,
        sync: false                   # e.g. "planeteria.com,client-one.com". Empty = allow any URL.

      # --- Concurrency & limits ---
      - key: AUDIT_CONCURRENCY
        value: "1"                    # Chromium is heavy; raise only on a larger plan.
      - key: MAX_PAGES_LIMIT
        value: "100"

      # --- Amazon S3 for evidence storage ---
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: us-west-2              # the AWS region your bucket lives in.
      - key: S3_ACCESS_KEY_ID         # IAM user with PutObject/GetObject on the bucket.
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_BASE_URL       # Optional: public/CloudFront base URL. If unset, presigned URLs are returned.
        sync: false
      - key: S3_URL_TTL_SECONDS
        value: "604800"               # 7 days (presigned URL lifetime)
